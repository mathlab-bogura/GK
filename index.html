<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>সাধারণ জ্ঞান ডেটা এন্ট্রি</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; }
    
    .top-bar {
      background-color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      color: white;
    }
    .menu-icon { font-size: 24px; cursor: pointer; color: #a9a9bc; }
    .title { font-size: 18px; margin-left: 15px; flex-grow: 1; }
    
    .dropdown-pill {
      background-color: #dbe4ff;
      color: #0b1a60;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 500;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230b1a60' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 1em;
      padding-right: 35px;
    }
    
    .add-icon {
      background-color: #11111d;
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; justify-content: center; align-items: center;
      font-size: 24px; margin-left: 15px; cursor: pointer;
    }

    .form-container { padding: 20px; max-width: 600px; margin: 30px auto; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: vertical; }
    
    .btn-submit {
      background-color: #4CAF50; color: white; padding: 12px 20px; border: none; border-radius: 8px; width: 100%; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .btn-submit:hover { background-color: #45a049; }
    #status { margin-top: 15px; text-align: center; font-weight: bold; }
    
    /* মেধা স্বত্ত অংশের ডিজাইন (আলাদা করা হয়েছে) */
    .footer-credit {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 30px;
    }
    .credit-title {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }
    .credit-name {
      color: #1a1a2e;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="menu-icon">☰</div>
    <div class="title">GK Entry</div>
    
    <select id="category" class="dropdown-pill">
      <option value="অর্থনীতি">অর্থনীতি</option>
      <option value="বাংলাদেশ">বাংলাদেশ</option>
      <option value="আন্তর্জাতিক">আন্তর্জাতিক</option>
      <option value="নারী সংক্রান্ত">নারী সংক্রান্ত</option>
      <option value="পরিবেশ ইস্যু">পরিবেশ ইস্যু</option>
      <option value="বিজ্ঞান">বিজ্ঞান</option>
      <option value="খেলাধুলা">খেলাধুলা</option>
      <option value="খেলাধুলা">বিবিধ</option>
    </select>
    
    <div class="add-icon">+</div>
  </div>

  <div class="form-container">
    <form id="gkForm">
      <div class="input-group">
        <label for="question" style="color: red;">প্রশ্ন (লাল কালিতে সেভ হবে):</label>
        <textarea id="question" rows="3" placeholder="প্রশ্ন লিখুন..." required></textarea>
      </div>
      
      <div class="input-group">
        <label for="answer" style="color: green;">উত্তর (সবুজ কালিতে সেভ হবে):</label>
        <textarea id="answer" rows="3" placeholder="উত্তর লিখুন..." required></textarea>
      </div>
      
      <button type="submit" class="btn-submit" id="submitBtn">তথ্য জমা দিন</button>
    </form>
    <div id="status"></div>
  </div>

  <!-- মেধা স্বত্ত এবং নাম আলাদা করা হয়েছে -->
  <div style="text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; color: #444; border-top: 1px solid #ddd; padding-top: 20px; margin-top: 40px; font-size: 13px;">
  <p style="margin: 0; font-weight: bold; color: #2c3e50;">
  &copy; 2026 Mahmudul Hasan | সর্বস্বত্ব সংরক্ষিত
  </p>
  
  </div>

  <script>
    // এখানে আপনার গুগল শিটের Web App URL টি বসান
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwGgdgiqt27eg8tC2AS1hnRiCU6mM94F9CVzqWScNFPfQ7kOKNN_y_wI3Sp_EH7bmE6/exec';

    const form = document.getElementById('gkForm');
    form.addEventListener('submit', e => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      
      submitBtn.disabled = true;
      submitBtn.innerText = "জমা হচ্ছে...";
      
      const formData = new FormData();
      formData.append('category', document.getElementById('category').value);
      formData.append('question', document.getElementById('question').value);
      formData.append('answer', document.getElementById('answer').value);

      fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => response.text())
        .then(result => {
          if(result === "Success") {
            status.style.color = "green";
            status.innerText = "তথ্য সফলভাবে শিটে জমা হয়েছে!";
            document.getElementById('question').value = '';
            document.getElementById('answer').value = '';
          } else {
            status.style.color = "red";
            status.innerText = "কোথাও সমস্যা হয়েছে!";
          }
          submitBtn.disabled = false;
          submitBtn.innerText = "তথ্য জমা দিন";
          setTimeout(() => { status.innerText = ""; }, 3000);
        })
        .catch(error => {
          console.error('Error!', error.message);
          status.style.color = "red";
          status.innerText = "ইন্টারনেট সংযোগ বা URL চেক করুন!";
          submitBtn.disabled = false;
          submitBtn.innerText = "তথ্য জমা দিন";
        });
    });
  </script>
</body>
</html>
